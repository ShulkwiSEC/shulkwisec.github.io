<meta name="robots" content="index, follow"> 
<meta name="description" content="Read the latest cybersecurity blogs, technical articles, security tips and CTF Challenges Writeups.">

<header class="page-header text-center overflow-hidden" data-aos="fade-right" data-aos-delay="1000">
  <div class="container">
    <h1>Latest Blogs</h1>
    <p>Insights, stories, and creative ideas, CTF Challenges Writeups, Latest News...</p>
  </div>
</header>

<!-- Tags Filter -->
<section id="tags-filter-section" class="py-3">
  <div class="container">
    <div id="blog-tags-filter" class="d-flex flex-wrap gap-2">
      <!-- JS injects tags -->
    </div>
  </div>
</section>

<!-- Blogs Section -->
<section id="blogs" class="py-5 overflow-hidden">
  <div class="container">
    <!-- Non-Embedded Blogs -->
    <div class="mb-5" data-aos="fade-left" data-aos-delay="1000">
      <div class="row" id="none-embed-blogs">
        <!-- Blog cards will be injected here -->
      </div>
    </div>
  </div>
</section>

<!-- Blog Reading Mode Modal -->
<div class="modal fade" id="blogModal" tabindex="-1" aria-labelledby="blogModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 mt-5 mt-md-4 mt-lg-5">
        <h5 class="modal-title fw-bold" id="blogModalLabel"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4" style="max-height: 80vh; overflow-y: auto;">
        <img id="blogBanner" class="img-fluid rounded mb-4 shadow-sm" src="" alt="Blog Banner" />

        <p id="blogDescription" class="lead mb-4"></p>

        <div id="blogContent" class="blog-content"></div>
      </div>

      <div class="modal-footer flex-row align-items-start border-0 p-2">
        <button type="button" class="btn btn-sm btn-secondary mb-2" data-bs-dismiss="modal">
          Close
        </button>
        <button type="button" class="btn btn-sm btn-outline-primary" id="fullscreenBtn">
          ⛶ Fullscreen
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/blogs.js"></script>
<!-- fullscreen -->
<script>
  const modalEl = document.getElementById('blogModal');
  const fullscreenBtn = document.getElementById('fullscreenBtn');

  fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      modalEl.requestFullscreen().catch(err => console.error(err));
    } else {
      document.exitFullscreen();
    }
  });
</script>
