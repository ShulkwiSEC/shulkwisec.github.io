<PageTitle><title>ShulkwiSEC - Cybersecurity News</title></PageTitle>
<PageContent>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/news.css">
    <!-- Page Header -->
    <header class="page-header text-center overflow-hidden" data-aos="fade-right" data-aos-delay="1000">
      <div class="container">
        <h1>Latest Hacker News</h1>
        <p>Stay updated with the latest news from Hacker News.</p>
      </div>
    </header>
    <div class="filters d-flex justify-content-center align-items-center gap-2 fixed-bottom m-5">
      <button id="filter-top-stories" class="btn btn-primary">Top Stories</button>
      <button id="filter-best-stories" class="btn btn-success">Best Stories</button>
      <button id="filter-new-stories" class="btn btn-warning">New Stories</button>
    </div>
    <!-- News Section -->
    <section id="news" class="py-5 overflow-hidden">
      <div class="container">
        <!-- Non-Embedded News -->
        <div class="mb-5" data-aos="fade-left" data-aos-delay="1000">
          <h2 class="mb-4" id="lableofNews">Top News Stories</h2>
          <div class="row" id="none-embed-news">
            <!-- News cards will be injected here -->
          </div>
        </div>
      </div>
    </section>

    <!-- News Reading Mode Modal -->
    <div class="modal fade" id="newsModal" tabindex="-1" aria-labelledby="newsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="newsModalLabel"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="newsContent"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animations -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <!-- Markdown Supporting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.2/purify.min.js"></script>
    <script src="js/load.js"></script>
    <script src="js/news.js"></script>
    <!-- <script src="seealso.js"></script> -->
</PageContent>
