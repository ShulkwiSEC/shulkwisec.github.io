<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top" data-aos="fade-down" data-aos-delay="1000">
        <div class="container">
            <a class="navbar-brand display-1 text-white" href="index.html">ShulkwiSEC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header text-center overflow-hidden" data-aos="fade-right" data-aos-delay="1000">
      <div class="container">
        <h1>Latest Hacker News</h1>
        <p>Stay updated with the latest news from Hacker News.</p>
      </div>
    </header>
    <div class="filters d-flex justify-content-center align-items-center gap-2 fixed-bottom m-5">
      <button id="filter-top-stories" class="btn btn-primary">Top Stories</button>
      <button id="filter-best-stories" class="btn btn-success">Best Stories</button>
      <button id="filter-new-stories" class="btn btn-warning">New Stories</button>
    </div>
    <!-- News Section -->
    <section id="news" class="py-5 overflow-hidden">
      <div class="container">
        <!-- Non-Embedded News -->
        <div class="mb-5" data-aos="fade-left" data-aos-delay="1000">
          <h2 class="mb-4" id="lableofNews">Top News Stories</h2>
          <div class="row" id="none-embed-news">
            <!-- News cards will be injected here -->
          </div>
        </div>
      </div>
    </section>

    <!-- News Reading Mode Modal -->
    <div class="modal fade" id="newsModal" tabindex="-1" aria-labelledby="newsModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="newsModalLabel"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="newsContent"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

        <div class="container">

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

        AOS.init();

    <!-- Markdown Supporting -->
