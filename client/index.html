<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0F0F10" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="google-site-verification" content="G90nN9brf_reEun_UNR0plGwRmN1-7rkBEUpIPsBJHY" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Optimized Font Loading -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap">
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Arabic:wght@400;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    /* PWA install prompt — colors reference the same tokens as the app
       (see client/src/index.css :root), so this pre-React banner already
       matches whichever theme the visitor's OS/toggle resolves to. */
    #pwa-install-banner {
      position: fixed;
      bottom: 1.5rem;
      /* Slightly higher for modern mobile safe areas */
      left: 50%;
      transform: translateX(-50%) translateY(200%);
      width: 92%;
      /* Use slightly more width on mobile */
      max-width: 500px;
      padding: 1rem;
      background: hsl(var(--popover) / 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid hsl(var(--border));
      border-radius: 1.25rem;
      box-shadow: var(--shadow-2xl);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      color: hsl(var(--popover-foreground));
      pointer-events: auto;
      box-sizing: border-box;
      /* Ensures padding doesn't break width */
    }

    #pwa-install-banner.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Mobile-Specific Adjustment */
    @media (max-width: 480px) {
      #pwa-install-banner {
        flex-wrap: wrap;
        /* Allows buttons to wrap to a new line if needed */
        padding: 0.8rem;
        gap: 0.5rem;
      }

      .pwa-text {
        /* Ensures text doesn't push buttons off-screen */
        min-width: 120px;
      }

      .pwa-actions {
        width: 100%;
        /* Force buttons to their own row on very small screens */
        justify-content: flex-end;
        margin-top: 0.5rem;
        border-top: 1px solid hsl(var(--border));
        padding-top: 0.5rem;
      }
    }

    .pwa-icon {
      width: 40px;
      /* Reduced slightly for mobile */
      height: 40px;
      border-radius: 0.5rem;
      background: hsl(var(--background));
      padding: 2px;
      flex-shrink: 0;
    }

    .pwa-text {
      flex-grow: 1;
      overflow: hidden;
      /* Prevents text from expanding the container */
    }

    .pwa-text h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--font-display);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pwa-text p {
      margin: 0;
      font-size: 0.75rem;
      opacity: 0.7;
      font-family: var(--font-sans);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pwa-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .pwa-btn {
      border: none;
      padding: 0.5rem 0.8rem;
      border-radius: 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
    }

    .pwa-btn-install {
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
    }

    .pwa-btn-close {
      background: hsl(var(--muted));
      color: hsl(var(--muted-foreground));
    }

    .pwa-btn:active {
      transform: scale(0.95);
    }

    html,
    body {
      overflow-wrap: break-word;
      word-wrap: break-word;
      white-space: normal;
    }

    body * {
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
    }
  </style>
  <script type="text/javascript">    (function () { var redirect = window.location.search; if (redirect && redirect.startsWith('?p=')) { var path = decodeURIComponent(redirect.substring(3)); window.history.replaceState(null, null, path); } })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // updateViaCache: 'none' forces the browser to bypass its own cache for sw.js script
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then(reg => {
            // Check for updates periodically
            setInterval(() => reg.update(), 60 * 60 * 1000); // Once an hour

            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateBanner(newWorker);
                }
              });
            });
          })
          .catch(err => console.error('Service worker registration failed:', err));
      });

      // Handle the actual reload when the controller changes
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }

    function showUpdateBanner(worker) {
      const banner = document.createElement('div');
      banner.id = 'pwa-update-banner';
      banner.innerHTML = `
        <div style="position: fixed; bottom: 20px; right: 20px; background: hsl(var(--popover) / 0.95); color: hsl(var(--popover-foreground)); padding: 16px 24px; border-radius: 12px; box-shadow: var(--shadow-2xl); z-index: 9999; display: flex; align-items: center; gap: 16px; font-family: var(--font-sans); border: 1px solid hsl(var(--border)); backdrop-filter: blur(10px); animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);">
          <div style="display: flex; flex-direction: column; gap: 2px;">
            <span style="font-size: 14px; font-weight: 600; font-family: var(--font-display);">Update available</span>
            <span style="font-size: 11px; opacity: 0.7;">A new version of shulkwisec is ready</span>
          </div>
          <button id="sw-update-btn" style="background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;">Refresh now</button>
        </div>
        <style>
          @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
          #sw-update-btn:hover { filter: brightness(1.08); }
        </style>
      `;
      document.body.appendChild(banner);
      document.getElementById('sw-update-btn').onclick = () => {
        worker.postMessage({ type: 'SKIP_WAITING' });
      };
    }

    // PWA install prompt
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      // Show the banner once per session, unless already dismissed
      if (!sessionStorage.getItem('pwa-dismissed')) {
        setTimeout(() => {
          document.getElementById('pwa-install-banner').classList.add('show');
        }, 3000);
      }
    });

    function installPWA() {
      if (!deferredPrompt) return;
      document.getElementById('pwa-install-banner').classList.remove('show');
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
      });
    }

    function dismissPWA() {
      document.getElementById('pwa-install-banner').classList.remove('show');
      sessionStorage.setItem('pwa-dismissed', 'true');
    }

    // Dev helper: run testPWABanner() in the console to force the banner open
    window.testPWABanner = function () {
      sessionStorage.removeItem('pwa-dismissed');
      document.getElementById('pwa-install-banner').classList.add('show');
    };
  </script>
  <script async src="https://counterapi.com/counterapi.embed.js"></script>

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="shulkwisec" />
  <meta name="twitter:description"
    content="Bilingual technical blog for sharing web development knowledge and experiences" />
  <meta name="twitter:image" content="https://shulkwisec.github.io/favicon.png" />
</head>

<body>
  <div id="pwa-install-banner">
    <img src="/favicon.png" alt="App Icon" class="pwa-icon">
    <div class="pwa-text">
      <h3 id="pwa-title">shulkwisec</h3>
      <p id="pwa-desc">Install for a better experience</p>
    </div>
    <div class="pwa-actions">
      <button class="pwa-btn pwa-btn-install" onclick="installPWA()">Install</button>
      <button class="pwa-btn pwa-btn-close" onclick="dismissPWA()">✕</button>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
