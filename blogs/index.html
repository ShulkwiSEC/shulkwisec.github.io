<link rel="stylesheet" href="css/blogs.css">
<meta name="robots" content="index, follow"> 
<meta name="description" content="Read the latest cybersecurity blogs, technical articles, security tips and CTF Challenges Writeups.">

<header class="page-header text-center overflow-hidden" data-aos="fade-right" data-aos-delay="1000">
  <div class="container">
    <h1>Latest Blogs</h1>
    <p>Insights, stories, and creative ideas, CTF Challenges Writeups, Latest News...</p>
  </div>
</header>

<!-- Tags Filter -->
<section id="tags-filter-section" class="py-3">
  <div class="container">
    <div id="blog-tags-filter" class="d-flex flex-wrap gap-2">
      <!-- JS injects tags -->
    </div>
  </div>
</section>

<!-- Blogs Section -->
<section id="blogs" class="py-5 overflow-hidden">
  <div class="container">
    <!-- Non-Embedded Blogs -->
    <div class="mb-5" data-aos="fade-left" data-aos-delay="1000">
      <div class="row" id="none-embed-blogs">
        <!-- Blog cards will be injected here -->
      </div>
    </div>
  </div>
</section>

<!-- Blog Reading Mode Modal -->
<div class="modal fade" id="blogModal" tabindex="-1" aria-labelledby="blogModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="blogModalLabel"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="blog-page-container">
          <img id="blogBanner" class="img-fluid" src="" alt="Blog Banner" />
          <p id="blogDescription" class="lead"></p>
          <div id="blogContent" class="blog-content"></div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          <span class="d-none d-sm-inline">← </span>Back to Blogs
        </button>
        <button type="button" class="btn btn-outline-primary" id="fullscreenBtn">
          <span class="d-none d-sm-inline">📖 </span>Fullscreen
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/blogs.js"></script>
<!-- fullscreen -->
<script>
  const modalEl = document.getElementById('blogModal');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const body = document.body;

  // Prevent body scroll when modal is open
  const blogModal = new bootstrap.Modal(document.getElementById('blogModal'));
  
  modalEl.addEventListener('show.bs.modal', () => {
    body.classList.add('modal-open');
  });
  
  modalEl.addEventListener('hide.bs.modal', () => {
    body.classList.remove('modal-open');
    // Exit fullscreen if active
    if (document.fullscreenElement) {
      document.exitFullscreen();
    }
  });

  fullscreenBtn.addEventListener('click', () => {
    const modal = document.getElementById('blogModal');
    
    // Toggle Fullscreen instead of fullscreen
    if (modal.classList.contains('focus-mode')) {
      modal.classList.remove('focus-mode');
      fullscreenBtn.innerHTML = '<span class="d-none d-sm-inline">📖 </span>Fullscreen';
    } else {
      modal.classList.add('focus-mode');
      fullscreenBtn.innerHTML = '<span class="d-none d-sm-inline">📖 </span>Exit Focus';
    }
  });

  // Reset Fullscreen when modal closes
  modalEl.addEventListener('hide.bs.modal', () => {
    body.classList.remove('modal-open');
    modalEl.classList.remove('focus-mode');
    fullscreenBtn.innerHTML = '<span class="d-none d-sm-inline">📖 </span>Fullscreen';
  });
</script>
